# Configuration used for dependency checking with cargo-deny.
#
# For further details on all configuration options see:
# https://embarkstudios.github.io/cargo-deny/checks/cfg.html

[graph]
targets = [
  { triple = "x86_64-unknown-linux-gnu" },
  { triple = "x86_64-apple-darwin" },
  { triple = "x86_64-pc-windows-msvc" },
  { triple = "aarch64-apple-darwin" },
  { triple = "wasm32-unknown-unknown" },
]

[advisories]
ignore = [
  "RUSTSEC-2023-0071", # rsa Marvin Attack: (https://jira.corp.adobe.com/browse/CAI-5104)
]
version = 2
yanked = "deny"

[bans]
multiple-versions = "deny"
wildcards = "deny"
# `sha2` 0.11 pulls in the `digest` 0.11 ecosystem, while the `rsa`, `ecdsa`,
# and related RustCrypto signing crates still depend on the `digest` 0.10 line.
# This leaves both versions of these crates in the tree until those crates also
# move to `digest` 0.11. Skip the newer (0.11-era) duplicates until then.
skip = [
  { crate = "block-buffer@0.12.1", reason = "pulled in by sha2 0.11; rsa/ecdsa still use block-buffer 0.10" },
  { crate = "const-oid@0.10.2", reason = "pulled in by sha2 0.11; rsa/ecdsa still use const-oid 0.9" },
  { crate = "cpufeatures@0.3.0", reason = "pulled in by sha2 0.11; other crates still use cpufeatures 0.2" },
  { crate = "crypto-common@0.2.2", reason = "pulled in by sha2 0.11; rsa/ecdsa still use crypto-common 0.1" },
  { crate = "digest@0.11.3", reason = "pulled in by sha2 0.11; rsa/ecdsa still use digest 0.10" },
  { crate = "sha2@0.11.0", reason = "direct dependency; rsa re-exports sha2 0.10 for RSA signing/validation" },
]

[licenses]
allow = [
  "Apache-2.0",
  "BSD-2-Clause",
  "BSD-3-Clause",
  # "CC0-1.0",
  "ISC",
  # "LicenseRef-ring",
  "MIT",
  "MPL-2.0",
  "Unicode-3.0",
  # "Unicode-DFS-2016",
  "Zlib",
  "CDLA-Permissive-2.0",
]
confidence-threshold = 0.9
version = 2

[sources]
allow-git = []
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
unknown-git = "deny"
unknown-registry = "deny"
